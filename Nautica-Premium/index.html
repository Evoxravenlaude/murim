<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Nautica — Premium Web3 Marketplace</title>
    <meta name="description" content="Trade tokens, collect NFTs, and transact privately. Nautica is a ZK-native Web3 marketplace with institutional DEX, NFT marketplace, and Railgun-powered privacy." />
    <meta name="theme-color" content="#04060C" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nautica.iamravenlaude.workers.dev" />
    <meta property="og:title" content="Nautica — Premium Web3 Marketplace" />
    <meta property="og:description" content="Trade tokens, collect NFTs, and transact privately. ZK-native DEX + NFT marketplace + Railgun privacy." />
    <meta property="og:image" content="https://nautica.iamravenlaude.workers.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Nautica" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@nautica_web3" />
    <meta name="twitter:title" content="Nautica — Premium Web3 Marketplace" />
    <meta name="twitter:description" content="Trade tokens, collect NFTs, and transact privately. ZK-native DEX + NFT marketplace + Railgun privacy." />
    <meta name="twitter:image" content="https://nautica.iamravenlaude.workers.dev/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- Splash screen — shows before React mounts -->
    <style>
      html, body { margin: 0; padding: 0; background: #04060C; }
      #splash {
        position: fixed; inset: 0; background: #04060C;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; }
      .splash-logo { animation: splashPulse 1.6s ease-in-out infinite; }
      .splash-ring {
        width: 64px; height: 64px; border-radius: 50%;
        border: 1px solid rgba(0,245,212,0.2);
        position: absolute;
        animation: splashRing 2s ease-out infinite;
      }
      .splash-ring:nth-child(2) { animation-delay: 0.6s; }
      .splash-ring:nth-child(3) { animation-delay: 1.2s; }
      @keyframes splashPulse { 0%,100%{opacity:.8;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
      @keyframes splashRing { 0%{transform:scale(1);opacity:.4} 100%{transform:scale(2.2);opacity:0} }
      .splash-wordmark {
        margin-top: 20px;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 13px; font-weight: 700; letter-spacing: .3em;
        color: rgba(232,240,255,0.5); text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!-- Animated splash -->
    <div id="splash">
      <div style="position:relative;width:72px;height:72px;display:flex;align-items:center;justify-content:center;">
        <div class="splash-ring"></div>
        <div class="splash-ring"></div>
        <div class="splash-ring"></div>
        <svg class="splash-logo" width="56" height="56" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="position:relative;z-index:1">
          <defs>
            <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#00F5D4"/>
              <stop offset="100%" stop-color="#0EA5E9"/>
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="30" fill="#050A14"/>
          <circle cx="32" cy="32" r="29" fill="none" stroke="url(#sg)" stroke-width="1.5" opacity="0.8"/>
          <text x="32" y="43" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="31" fill="url(#sg)">N</text>
        </svg>
      </div>
      <div class="splash-wordmark">Nautica</div>
    </div>

    <div id="root"></div>

    <script>
      window.__removeSplash = function() {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(function() { splash.remove(); }, 450);
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
