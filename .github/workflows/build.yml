name: Build Murim Chronicles

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
    - uses: actions/checkout@v3

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev pkg-config

    - name: Configure CMake
      working-directory: ./murim-game
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      working-directory: ./murim-game
      run: cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MurimGame-${{ runner.os }}
        path: |
          murim-game/build/bin/
          murim-game/build/Release/
        retention-days: 7

  build-web:
    name: Build WebAssembly
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.44

    - name: Configure CMake
      working-directory: ./murim-game
      run: emcmake cmake -B build_web -DCMAKE_BUILD_TYPE=Release -DPLATFORM=Web

    - name: Build
      working-directory: ./murim-game
      run: emmake cmake --build build_web --config Release

    - name: Prepare Pages Artifact
      working-directory: ./murim-game
      run: |
        mkdir -p web_dist
        cp build_web/bin/murim_game.html web_dist/index.html
        cp build_web/bin/murim_game.js web_dist/
        cp build_web/bin/murim_game.wasm web_dist/

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: murim-game/web_dist

  deploy-web:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-web
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
